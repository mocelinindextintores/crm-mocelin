    function getReportLeads(){
      const search=(document.getElementById('reportSearchInput')?.value||'').toLowerCase();
      const status=document.getElementById('reportStatusFilter')?.value||'Todos';
      const profile=document.getElementById('reportProfileFilter')?.value||'Todos';
      const uf=document.getElementById('reportStateFilter')?.value||'Todos';
      const vendor=document.getElementById('reportVendorFilter')?.value||'Todos';
      const order=document.getElementById('reportOrderFilter')?.value||'recent';
      let leads=state.appData.leads.filter(lead=>{
        const matchSearch=!search||String(lead.company||'').toLowerCase().includes(search)||String(lead.contact||'').toLowerCase().includes(search)||String(lead.city||'').toLowerCase().includes(search);
        const matchStatus=status==='Todos'||lead.status===status;
        const matchProfile=profile==='Todos'||lead.profile===profile;
        const matchUf=uf==='Todos'||lead.state===uf;
        const matchVendor=vendor==='Todos'||lead.vendor===vendor;
        return matchSearch&&matchStatus&&matchProfile&&matchUf&&matchVendor;
      });
      const sorters={
        recent:(a,b)=>String(b.createdAtFull||'').localeCompare(String(a.createdAtFull||'')),
        old:(a,b)=>String(a.createdAtFull||'').localeCompare(String(b.createdAtFull||'')),
        budget_desc:(a,b)=>(b.budget||0)-(a.budget||0),
        budget_asc:(a,b)=>(a.budget||0)-(b.budget||0),
        sold_desc:(a,b)=>(b.sold||0)-(a.sold||0)
      };
      leads.sort(sorters[order]||sorters.recent);
      return leads;
    }

      const getColor=value=>{if(!value)return '#eef2f7'; const ratio=value/max; const r=219-Math.round(ratio*120); const g=234-Math.round(ratio*105); return `rgb(${Math.max(r,59)}, ${Math.max(g,130)}, 255)`;};
      const getText=value=>value?'#fff':'#64748b';
      return `<div class="brazil-svg-wrap"><div id="mapTooltip" class="map-tooltip"></div><div class="brazil-map-grid">${states.map(uf=>{const leadCount=counts[uf]||0; const soldValue=soldByState[uf]||0; const bg=getColor(leadCount); const color=getText(leadCount); return `<button type="button" class="state-sales-btn" onmouseenter="window.crmShowMapTooltip(event,'${uf}',${leadCount},'${String(soldValue)}')" onmousemove="window.crmMoveMapTooltip(event)" onmouseleave="window.crmHideMapTooltip()" onclick="window.crmSelectSalesState('${uf}')" style="background:${bg};color:${color};border-color:${leadCount?bg:'#e5e7eb'}">${uf}<small>${leadCount} lead(s)</small></button>`;}).join('')}</div><div class="map-caption"><div>Mapa simplificado colorido por quantidade de leads por estado.</div><div class="map-legend"><span>Menor</span><span class="legend-scale" style="background:linear-gradient(90deg,#dbeafe 0%,#3b82f6 100%)"></span><span>Maior</span></div></div></div>`;
    }
    async function renderBrazilSalesMap(leads){
      const host=document.getElementById('brazilSalesMapArea');
      if(!host) return;
      host.innerHTML='<div class="brazil-svg-wrap"><div class="dashboard-count-note">Carregando mapa vetorial do Brasil...</div></div>';
      const libsOk=await ensureMapLibraries();
      const geo=await ensureBrazilGeojson();
      if(!libsOk || !geo || !window.d3){
        host.innerHTML=renderBrazilSalesMapFallback(leads);
        return;
      }
      const counts={};
      const soldByState={};
      const getUF=feature=>{const p=feature?.properties||{};const raw=p.sigla||p.uf||p.UF||p.UF_05||p.abbrev||p.abbreviation||p.code||p.name||p.nome||'';const mapNames={'Acre':'AC','Alagoas':'AL','Amapá':'AP','Amazonas':'AM','Bahia':'BA','Ceará':'CE','Distrito Federal':'DF','Espírito Santo':'ES','Goiás':'GO','Maranhão':'MA','Mato Grosso':'MT','Mato Grosso do Sul':'MS','Minas Gerais':'MG','Pará':'PA','Paraíba':'PB','Paraná':'PR','Pernambuco':'PE','Piauí':'PI','Rio de Janeiro':'RJ','Rio Grande do Norte':'RN','Rio Grande do Sul':'RS','Rondônia':'RO','Roraima':'RR','Santa Catarina':'SC','São Paulo':'SP','Sergipe':'SE','Tocantins':'TO'};return mapNames[raw]||String(raw).toUpperCase();};
      leads.forEach(l=>{ if(l.state){ counts[l.state]=(counts[l.state]||0)+1; soldByState[l.state]=(soldByState[l.state]||0)+Number(l.sold||0); } });
      const metric='lead_count';
      const metricValues=Object.keys(counts).reduce((acc,uf)=>{acc[uf]=counts[uf]||0;return acc;},{});
      const max=Math.max(1,...Object.values(metricValues),1);
      const getFill=value=>{if(!value)return '#eef2f7'; const ratio=value/max; const r=219-Math.round(ratio*120); const g=234-Math.round(ratio*105); return `rgb(${Math.max(r,59)}, ${Math.max(g,130)}, 255)`;};
      host.innerHTML=`<div class="brazil-svg-wrap"><div id="mapTooltip" class="map-tooltip"></div><svg id="brazilGeoSvg" class="brazil-svg" viewBox="0 0 780 687" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mapa do Brasil por estado"></svg><div class="map-caption"><div>Clique em um estado para detalhar cidades, volume e ticket médio.</div><div class="map-legend"><span>Menor</span><span class="legend-scale" style="background:linear-gradient(90deg,#dbeafe 0%,#3b82f6 100%)"></span><span>Maior</span></div></div></div>`;
      const svg=window.d3.select('#brazilGeoSvg');
      const width=780, height=687;
      const projection=window.d3.geoMercator().fitSize([width,height],geo);
      const path=window.d3.geoPath(projection);
      svg.append('g').selectAll('path').data(geo.features).join('path')
        .attr('class','state-shape')
        .attr('d',path)
        .attr('fill',d=>{const uf=getUF(d); return getFill(metricValues[uf]||0);})
        .attr('data-state',d=>getUF(d))
        .style('stroke',d=>(state.selectedSalesState===getUF(d))?'#f00606':'#fff')
        .style('stroke-width',d=>(state.selectedSalesState===getUF(d))?3.5:1.5)
        .on('mouseenter',function(event,d){const uf=getUF(d); window.crmShowMapTooltip(event,uf,counts[uf]||0,String(soldByState[uf]||0));})
        .on('mousemove',function(event){window.crmMoveMapTooltip(event);})
        .on('mouseleave',function(){window.crmHideMapTooltip();})
        .on('click',function(event,d){const uf=getUF(d); window.crmSelectSalesState(uf);});
      svg.append('g').selectAll('text').data(geo.features).join('text')
        .attr('class','state-label')
        .attr('transform',d=>`translate(${path.centroid(d)})`)
        .attr('text-anchor','middle')
        .attr('dy','.35em')
        .text(d=>getUF(d));
    }
    function renderTopCitiesRanking(leads){
      const byCity={};
      leads.forEach(lead=>{
        const key=(lead.city||'Sem cidade')+' / '+(lead.state||'--');
        if(!byCity[key]) byCity[key]={count:0,sold:0};
        byCity[key].count+=1;
        byCity[key].sold+=Number(lead.sold||0);
      });
      const rows=Object.entries(byCity).map(([city,data])=>({city,...data,ticket:data.count?data.sold/data.count:0})).sort((a,b)=>b.sold-a.sold||b.count-a.count).slice(0,5);
      if(!rows.length){
        return `<div class="sales-ranking-card"><div class="sales-ranking-title">Top cidades</div><div class="dashboard-count-note">Nenhum dado para ranking.</div></div>`;
      }
      return `<div class="sales-ranking-card"><div class="sales-ranking-title">Top cidades</div>${rows.map((row,idx)=>`<div class="sales-ranking-item"><div class="sales-ranking-left"><div class="sales-ranking-pos">${idx+1}</div><div><div class="sales-ranking-city">${row.city}</div><div class="sales-ranking-meta">${row.count} compra(s) • Ticket ${formatMoney(row.ticket)}</div></div></div><div class="sales-ranking-value">${formatMoney(row.sold)}</div></div>`).join('')}</div>`;
    }
    function renderStateSalesDetails(uf){
      const area=document.getElementById('stateSalesDetailsArea');
      if(!area) return;
      const leads=getReportLeads().filter(l=>l.state===uf);
      if(!leads.length){
        area.innerHTML=`<div style="color:#64748b">Nenhum dado encontrado para ${uf}.</div>`;
        return;
      }
      const totalLeads=leads.length;
      const ganhos=leads.filter(l=>l.status==='Ganho').length;
      const valorVendido=leads.reduce((s,l)=>s+Number(l.sold||0),0);
      const taxaConversao=totalLeads?((ganhos/totalLeads)*100):0;
      const ticketMedio=ganhos?(valorVendido/ganhos):0;
      area.innerHTML=`
        <div style="width:100%;display:flex;flex-direction:column;gap:16px">
          <div style="font-size:18px;font-weight:800">Estado ${uf}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
            <div class="card" style="padding:18px;border-radius:16px"><div style="font-size:12px;color:#64748b;text-transform:uppercase;font-weight:700">Quantos Leads</div><div style="font-size:30px;font-weight:800;margin-top:10px">${totalLeads}</div></div>
            <div class="card" style="padding:18px;border-radius:16px"><div style="font-size:12px;color:#64748b;text-transform:uppercase;font-weight:700">Taxa de Conversão</div><div style="font-size:30px;font-weight:800;margin-top:10px;color:#9333ea">${taxaConversao.toFixed(1).replace('.',',')}%</div></div>
            <div class="card" style="padding:18px;border-radius:16px"><div style="font-size:12px;color:#64748b;text-transform:uppercase;font-weight:700">Ticket Médio</div><div style="font-size:30px;font-weight:800;margin-top:10px;color:#16a34a">${formatMoney(ticketMedio)}</div></div>
          </div>
          <div class="card" style="padding:18px;border-radius:16px">
            <div style="font-size:13px;color:#64748b;margin-bottom:10px">Resumo complementar</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
              <div><div style="font-size:12px;color:#64748b">Vendas fechadas</div><div style="font-weight:800;font-size:18px">${ganhos}</div></div>
              <div><div style="font-size:12px;color:#64748b">Valor vendido</div><div style="font-weight:800;font-size:18px;color:#16a34a">${formatMoney(valorVendido)}</div></div>
              <div><div style="font-size:12px;color:#64748b">Leads em orçamento</div><div style="font-weight:800;font-size:18px">${leads.filter(l=>l.status==='Em Orçamento').length}</div></div>
            </div>
          </div>
        </div>`;
    }
    function exportReportLeads(){
      const leads=getReportLeads();
      const headers=['codigo','empresa','contato','cidade','estado','perfil','vendedor','status','numero_orcamento','valor_orcado','valor_fechado','data_entrada'];
      const rows=leads.map(l=>[l.code,l.company,l.contact,l.city,l.state,l.profile,l.vendor,l.status,l.quoteNumber,l.budget||0,l.sold||0,l.createdAt]);
      const csv=[headers.join(';'),...rows.map(row=>row.map(v=>`"${String(v ?? '').replace(/"/g,'""')}"`).join(';'))].join('\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download='leads-relatorio.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    function renderReports(){
      const leads=getReportLeads();
      const total=leads.length;
      const sold=leads.reduce((s,l)=>s+Number(l.sold||0),0);
      const won=leads.filter(l=>l.status==='Ganho').length;
      const qualified=leads.filter(l=>['Qualificado','Repassado ao Comercial','Em Orçamento','Ganho'].includes(l.status)).length;
      const budgetStageLeads=leads.filter(l=>l.status==='Em Orçamento');
      const budgetStageValue=budgetStageLeads.reduce((s,l)=>s+Number(l.budget||0),0);
      const conversion=total?(won/total)*100:0;
      const ticket=won?sold/won:0;
      animateValue(document.getElementById('reportMetricTotal'),0,total,v=>Math.round(v));
      animateValue(document.getElementById('reportMetricSold'),0,sold,v=>formatMoney(v));
      animateValue(document.getElementById('reportMetricConversion'),0,conversion,v=>v.toFixed(1).replace('.',',')+'%');
      animateValue(document.getElementById('reportMetricTicket'),0,ticket,v=>formatMoney(v));
      animateValue(document.getElementById('reportQualifiedValue'),0,qualified,v=>Math.round(v));
      animateValue(document.getElementById('reportBudgetStageValue'),0,budgetStageValue,v=>formatMoney(v));
      animateValue(document.getElementById('reportClosedSalesValue'),0,won,v=>Math.round(v));
      document.getElementById('reportQualifiedMeta').textContent=`${total?((qualified/total)*100).toFixed(1).replace('.',','):0}% do total`;
      document.getElementById('reportBudgetStageMeta').textContent=`${budgetStageLeads.length} leads`;
      document.getElementById('reportClosedSalesMeta').textContent='leads convertidos';
      const statusCounts={};
      state.appData.config.funnelStatuses.forEach(s=>statusCounts[s]=0);
      leads.forEach(l=>{statusCounts[l.status]=(statusCounts[l.status]||0)+1});
      const profileCounts={Quente:0,Morno:0,Frio:0};
      leads.forEach(l=>{if(profileCounts[l.profile]!==undefined) profileCounts[l.profile]+=1});
      const channelCounts={};
      leads.forEach(l=>{const key=l.channel||'Outros';channelCounts[key]=(channelCounts[key]||0)+1});
      const typeCounts={};
      leads.forEach(l=>{const key=l.customerType||'Outros';typeCounts[key]=(typeCounts[key]||0)+1});
      document.getElementById('statusChartArea').innerHTML=renderStatusChart(statusCounts);
      document.getElementById('profileChartArea').innerHTML=renderDonutChart(profileCounts,['#ef4444','#f59e0b','#3b82f6']);
      document.getElementById('channelChartArea').innerHTML=renderSimpleBarChart(channelCounts,true);
      document.getElementById('clientTypeChartArea').innerHTML=renderDonutChart(typeCounts,['#3b82f6','#10b981','#a855f7','#f59e0b']);
      renderBrazilSalesMap(leads);
      document.getElementById('salesTopCitiesArea').innerHTML=renderTopCitiesRanking(leads);
      if(state.selectedSalesState){
        renderStateSalesDetails(state.selectedSalesState);
      }else{
        const area=document.getElementById('stateSalesDetailsArea');
        if(area) area.innerHTML='<div style="min-height:320px;display:flex;align-items:center;justify-content:center;color:#64748b">Selecione um estado no mapa para ver quantos leads, taxa de conversão e ticket médio.</div>';
      }
      const potentials=['Alto','Médio','Baixo'];
      document.getElementById('reportsPotentialBody').innerHTML=potentials.map(p=>{
        const group=leads.filter(l=>(l.potential||'Médio')===p);
        const qty=group.length;
        const gains=group.filter(l=>l.status==='Ganho').length;
        const totalValue=group.reduce((s,l)=>s+Number(l.sold||0),0);
        const rate=qty?((gains/qty)*100).toFixed(1).replace('.',',')+'%':'0,0%';
        return `<tr><td>${p}</td><td>${qty}</td><td>${gains}</td><td>${rate}</td><td class="report-green-text">${formatMoney(totalValue)}</td></tr>`;
      }).join('');
    }
    function clearReportsData(){if(!confirm('Tem certeza que deseja zerar todos os relatórios?'))return;state.appData.leads=[];saveData();renderLeadsTable();renderReports()}
    function handleLogin(){const email=document.getElementById('loginEmail').value.trim().toLowerCase();const password=document.getElementById('loginPassword').value;const feedback=document.getElementById('loginFeedback');const user=state.appData.auth.users.find(u=>u.email.toLowerCase()===email&&u.password===password);if(!user){feedback.textContent='E-mail ou senha inválidos.';return}state.session={id:user.id,name:user.name,email:user.email,role:user.role};saveSession(state.session);render()}

    function bind(id,event,handler){const el=document.getElementById(id);if(el)el.addEventListener(event,handler)}
    function setActiveView(view){const isSeller=state.session?.role==='Vendedor';const allowedViews=isSeller?['dashboard','pipeline','meus-leads']:['dashboard','pipeline','novo-lead','meus-leads','relatorios','usuarios','configuracoes'];if(!allowedViews.includes(view))view='dashboard';state.activeView=view;document.querySelectorAll('.page').forEach(page=>page.classList.remove('active'));const target=document.getElementById('page-'+view);if(target){target.classList.add('active');void target.offsetWidth}document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.view===view));if(view==='dashboard')updateDashboardMetrics();if(view==='pipeline')renderPipeline();if(view==='meus-leads')renderLeadsTable();if(view==='usuarios')renderUsersTable();if(view==='relatorios')renderReports()}

    function moveMapTooltip(event){const tip=document.getElementById('mapTooltip');if(!tip)return;const wrap=tip.parentElement?.getBoundingClientRect();if(!wrap)return;tip.style.left=(event.clientX-wrap.left+14)+'px';tip.style.top=(event.clientY-wrap.top+14)+'px'}
    function hideMapTooltip(){const tip=document.getElementById('mapTooltip');if(tip)tip.classList.remove('show')}
    function parseMoneyInput(v){const digits=String(v||'').split('').filter(ch=>ch>='0'&&ch<='9').join('');return digits?Number(digits)/100:0}
    function bindMoneyMask(id){const input=document.getElementById(id);if(!input||input.dataset.moneyBound==='1')return;input.dataset.moneyBound='1';const apply=()=>{const value=parseMoneyInput(input.value);input.value=value?formatMoney(value):''};input.addEventListener('input',apply);input.addEventListener('blur',apply)}
    function bindAppEvents(){const channelSelect=document.getElementById('leadChannelSelect');const campaignInput=document.getElementById('leadCampaignInput');function toggleCampaignField(){if(!channelSelect||!campaignInput)return;const val=channelSelect.value;const shouldShow=['Site','Redes Sociais','Google'].includes(val);campaignInput.parentElement.style.display=shouldShow?'block':'none';if(!shouldShow)campaignInput.value='';}if(channelSelect){channelSelect.addEventListener('change',toggleCampaignField);toggleCampaignField();}document.querySelectorAll('.nav-btn').forEach(btn=>{btn.addEventListener('click',()=>{if(btn.dataset.view==='novo-lead')resetLeadForm();state.activeView=btn.dataset.view;setActiveView(state.activeView)})});bind('logoutButton','click',logoutSystem);bind('leadSaveButton','click',saveLeadForm);bind('leadCancelButton','click',()=>{resetLeadForm();setActiveView('meus-leads')});bind('leadCnpjInput','input',e=>{e.target.value=formatCnpj(e.target.value)});bind('leadPhoneInput','input',e=>{e.target.value=formatPhone(e.target.value)});bind('leadStateSelect','change',e=>{populateCitiesByState(e.target.value);const cityInput=document.getElementById('leadCityInput');if(cityInput)cityInput.value='';});bind('leadCityInput','input',e=>{filterCities(e.target.value,e.target.dataset.state)});bind('leadCityInput','focus',e=>{filterCities(e.target.value,e.target.dataset.state)});document.addEventListener('click',e=>{const cityInput=document.getElementById('leadCityInput');const dropdown=document.getElementById('cityDropdown');if(!dropdown)return;const wrap=cityInput?.parentElement;if(wrap&&!wrap.contains(e.target))dropdown.style.display='none';});bind('leadCnpjInput','blur',autoLoadExistingClient);bind('leadPhoneInput','blur',autoLoadExistingClient);bind('leadEmailInput','blur',autoLoadExistingClient);bind('newUserButton','click',()=>openUserModal('create'));bind('userSaveButton','click',saveUserFromModal);bind('closeUserModalButton','click',closeUserModal);bind('userCancelButton','click',closeUserModal);bind('closeLeadModalButton','click',closeLeadModal);bind('leadModalBackButton','click',closeLeadModal);bind('registerLeadActionButton','click',registerLeadAction);bind('leadQuickCall','click',()=>registerQuickLeadAction('call'));bind('leadQuickMail','click',()=>registerQuickLeadAction('mail'));bind('leadQuickWhatsapp','click',()=>registerQuickLeadAction('whatsapp'));bind('leadQuickTask','click',()=>registerQuickLeadAction('task'));bind('salesTabHistory','click',showSalesHistoryTab);bind('salesTabTasks','click',showSalesTasksTab);document.querySelectorAll('.interaction-filter-btn').forEach(btn=>btn.addEventListener('click',()=>setHistoryFilter(btn.dataset.filter)));bind('taskCancelButton','click',closeTaskModal);bind('taskSaveButton','click',saveTaskFromModal);bind('taskDateOpenButton','click',openTaskDatePicker);bind('taskDateDisplayInput','click',openTaskDatePicker);bind('taskDateApplyButton','click',applyTaskDateSelection);bind('taskDateInput','change',syncTaskDateDisplay);bind('whatsappCancelButton','click',closeWhatsappModal);bind('whatsappSaveButton','click',saveWhatsappFromModal);bind('emailCancelButton','click',closeEmailModal);bind('emailSaveButton','click',saveEmailFromModal);bind('callCancelButton','click',closeCallModal);bind('callSaveButton','click',saveCallFromModal);bind('editLeadBudgetButton','click',()=>editLeadMoneyField('budget'));bind('editLeadSoldButton','click',()=>editLeadMoneyField('sold'));bind('moneyEditCancelButton','click',closeMoneyEditModal);bind('moneyEditSaveButton','click',saveMoneyEditModal);bind('moneyEditInput','input',e=>{const value=parseMoneyInput(e.target.value);e.target.value=value?formatMoney(value):'';});bind('lossReasonCancelButton','click',closeLossReasonModal);bind('lossReasonConfirmButton','click',confirmLossReasonMove);bind('dashboardResetFiltersButton','click',()=>{const ids=['dashboardSearchInput','dashboardStatusFilter','dashboardProfileFilter','dashboardVendorFilter'];ids.forEach(id=>{const el=document.getElementById(id);if(!el)return;if(el.tagName==='SELECT')el.selectedIndex=0;else el.value='';});updateDashboardMetrics();});bind('exportLeadsButton','click',exportReportLeads);['reportSearchInput','reportStatusFilter','reportProfileFilter','reportStateFilter','reportVendorFilter','reportOrderFilter'].forEach(id=>{const el=document.getElementById(id);if(el){el.addEventListener('input',renderReports);el.addEventListener('change',renderReports)}});['leadsSearchInput','leadsCodeFilter','leadsQuoteFilter','leadsStatusFilter','leadsProfileFilter','leadsVendorFilter'].forEach(id=>{const el=document.getElementById(id);if(el){el.addEventListener('input',renderLeadsTable);el.addEventListener('change',renderLeadsTable)}});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLeadModal();closeUserModal();closeTaskModal();closeWhatsappModal();closeEmailModal();closeCallModal();closeMoneyEditModal();closeLossReasonModal()}});bindMoneyMask('leadBudgetInput');bindMoneyMask('leadSoldInput');bindToggleButtons()}
    function exposeGlobals(){window.crmOpenLeadModal=openLeadModal;window.crmEditLead=editLead;window.crmDeleteLead=deleteLead;window.crmOpenUserModal=openUserModal;window.crmDeleteUser=deleteUser;window.crmEditConfigItem=editConfigItem;window.crmDeleteConfigItem=deleteConfigItem;window.crmSaveConfigItem=saveConfigItem;window.crmCancelItem=cancelItem;window.crmMoveLead=moveLeadToStage;window.crmSelectSalesState=selectSalesState;window.crmShowMapTooltip=showMapTooltip;window.crmMoveMapTooltip=moveMapTooltip;window.crmHideMapTooltip=hideMapTooltip;window.editLeadMoneyField=editLeadMoneyField}

    state.appData=loadData();state.session=loadSession();render();
